    <!-- 加载指示器脚本 -->
    <script>
        // 页面加载进度指示器
        document.addEventListener('DOMContentLoaded', function () {
            // 创建加载指示器
            const indicator = document.createElement('div');
            indicator.className = 'loading-indicator';
            indicator.innerHTML = '<div class="loading-bar" id="loadingBar"></div>';
            document.body.appendChild(indicator);

            // 更新加载进度
            const loadingBar = document.getElementById('loadingBar');
            let progress = 10;

            // 初始进度
            loadingBar.style.width = progress + '%';

            // 模拟加载进度
            const progressInterval = setInterval(function () {
                // 缓慢增加进度，最多到90%
                if (progress < 90) {
                    progress += (90 - progress) / 10;
                    loadingBar.style.width = progress + '%';
                }
            }, 200);

            // 窗口加载完成时
            window.addEventListener('load', function () {
                loadingBar.style.width = '100%';

                // 加载完成后隐藏进度条
                setTimeout(function () {
                    indicator.style.opacity = '0';
                    setTimeout(function () {
                        indicator.remove();
                        clearInterval(progressInterval);
                    }, 300);
                }, 500);
            });
        });
    </script>

    <script>
        // 全局函数：优化公式中的斜杠处理
        function convertBackslashes() {
            console.log('开始优化公式中的斜杠处理...');

            // 获取所有包含公式的元素
            const mathElements = document.querySelectorAll('*:not(script):not(style)');

            mathElements.forEach(el => {
                // 检查元素内容是否包含公式
                const text = el.innerHTML;
                if (text.includes('$')) {
                    // 处理行间公式

                        return '$$' + processed + '$$';

                    newText = newText.replace(/\$([^\$\n]+?)\$/g, function (match, formula) {
                        // 确保LaTeX命令前有单斜杠，但不重复添加
                        let processed = formula.replace(/\\\\([a-zA-Z]+)/g, '\\$1');
                        return '$' + processed + '$';
                    });

                    // 更新元素内容
                    if (newText !== text) {
                        el.innerHTML = newText;
                    }
                }
            });

    <!-- 错误处理脚本 -->
    <script>
        // 添加全局错误处理
        window.addEventListener('error', function (event) {
            console.error('全局错误:', event.message, 'at', event.filename, ':', event.lineno);
        });

        // 关键函数先定义在全局作用域
        // 筛选按钮处理函数 - 优化版
        window.filterButtonHandler = function (e) {
            e.preventDefault();
            
            // 获取筛选条件
            const filter = this.getAttribute('data-filter');
            
            // 使用requestAnimationFrame来避免在渲染周期内进行大量 DOM 操作
            requestAnimationFrame(() => {
                // 获取所有筛选按钮
                const filterButtons = document.querySelectorAll('.filter-btn');
                
                // 移除所有按钮的active类
                filterButtons.forEach(btn => btn.classList.remove('active'));
                
                // 添加当前按钮的active类
                this.classList.add('active');
                
                // 使用渲染函数筛选习题
                if (window.renderExercises && typeof window.renderExercises === 'function') {
                    window.renderExercises(filter);
                } else {
                    window.pendingFilter = filter;
                }
            });
        };

        // 解析按钮处理函数
        window.solutionToggleHandler = function (e) {
            e.preventDefault();

            const exerciseId = this.getAttribute('data-exercise-id');
            console.log(`点击解析按钮: ${exerciseId}`);

            const solution = document.getElementById('solution-' + exerciseId);
            if (!solution) {
                console.error(`找不到解析容器: ${exerciseId}`);
                return;
            }

            // 切换显示状态
            const isVisible = solution.classList.contains('show');
            if (isVisible) {
                // 隐藏解析
                solution.classList.remove('show');
                solution.style.display = 'none';
                this.innerHTML = '<i class="fas fa-lightbulb"></i> 查看解析';
            } else {
                // 显示解析
                solution.classList.add('show');
                solution.style.display = 'block';
                solution.style.maxHeight = 'none';
                solution.style.overflow = 'visible';
                this.innerHTML = '<i class="fas fa-eye-slash"></i> 隐藏解析';

                // 确保MathJax重新渲染该容器中的公式
                if (window.MathJax) {
                    try {
                        if (MathJax.typesetPromise) {
                            MathJax.typesetPromise([solution]).catch(err => {
                                console.warn('MathJax渲染警告:', err);
                            });
                        } else if (MathJax.Hub) {
                            MathJax.Hub.Queue(["Typeset", MathJax.Hub, solution]);
                        }
                    } catch (err) {
                        console.error('公式渲染出错:', err);
                    }
                }

                // 微分方程章节不需要绘制图形
                // 确保所有题目的公式正确渲染
                if (window.MathJax) {
                    try {
                        if (MathJax.typesetPromise) {
                            MathJax.typesetPromise([solution]);
                        } else if (MathJax.Hub) {
                            MathJax.Hub.Queue(["Typeset", MathJax.Hub, solution]);
                        }
                    } catch (err) {
                        console.error('公式渲染出错:', err);
                    }
                }
            }
        };

        // 添加缺失的按钮更新函数（最关键的函数）
        window.updateCategoryButtons = function () {
            console.log('正在更新分类按钮...');
            // 获取所有筛选按钮
            const filterButtons = document.querySelectorAll('.filter-btn');
            if (!filterButtons.length) {
                console.warn('未找到筛选按钮');
                return;
            }

            // 确保按钮可点击
            filterButtons.forEach(button => {
                // 移除旧的事件监听器
                button.removeEventListener('click', window.filterButtonHandler);
                // 添加新的事件监听器
                button.addEventListener('click', window.filterButtonHandler);
            });

            console.log('分类按钮更新完成，共更新', filterButtons.length, '个按钮');
        };

        // 确保数据加载
        window.addEventListener('DOMContentLoaded', function () {
            // 立即调用更新函数确保按钮正常工作
            setTimeout(function () {
                if (typeof window.updateCategoryButtons === 'function') {
                    console.log('DOMContentLoaded: 立即调用updateCategoryButtons');
                    window.updateCategoryButtons();
                } else {
                    console.error('updateCategoryButtons函数未定义');
                }

                // 检查筛选按钮是否正常绑定事件
                const testButton = document.querySelector('.filter-btn');
                if (testButton) {
                    console.log('发现筛选按钮，尝试手动绑定事件');
                    testButton.addEventListener('click', window.filterButtonHandler);
                }
            }, 100);

            setTimeout(function () {
                if (!window.exerciseData || !Array.isArray(window.exerciseData.exercises)) {
                    console.error('数据未正确加载，尝试手动初始化');
                    // 如果数据未加载，尝试手动加载
                    var scriptElement = document.createElement('script');
                    scriptElement.src = 'js/differential-equation-data.js?v=' + new Date().getTime();
                    scriptElement.charset = 'UTF-8';
                    document.body.appendChild(scriptElement);

                    scriptElement.onload = function () {
                        console.log('数据脚本已重新加载');
                        // 修正脚本名称和引用路径
                        var mainScript = document.createElement('script');
                        mainScript.src = 'js/differential-equation-scriptjs.js?v=' + new Date().getTime();
                        mainScript.charset = 'UTF-8';
                        document.body.appendChild(mainScript);

                        // 脚本加载后再次尝试更新按钮
                        mainScript.onload = function () {
                            console.log('主脚本加载完成，再次尝试更新按钮');
                            if (typeof window.updateCategoryButtons === 'function') {
                                window.updateCategoryButtons();
                            } else {
                                console.error('主脚本加载后updateCategoryButtons仍未定义');
                            }
                        };
                    };
                }
            }, 1000);
        });
    </script>

    <!-- 添加紧急内联修复脚本，确保在脚本文件未被正确加载的情况下按钮也能工作 -->
    <script>
        // 直接在HTML中执行的紧急修复
        document.addEventListener('DOMContentLoaded', function () {
            console.log('【内联紧急修复】DOM已加载，准备修复解析按钮');

            function inlineFixButtons() {
                const buttons = document.querySelectorAll('.solution-toggle');
                console.log(`【内联紧急修复】找到 ${buttons.length} 个解析按钮`);

                buttons.forEach(function (button) {
                    if (button.getAttribute('data-solution')) {
                        return;
                    }

                    const exerciseId = button.getAttribute('data-exercise-id');
                    if (!exerciseId) {
                        return;
                    }

                    console.log(`【内联紧急修复】处理按钮 ${exerciseId}`);

                    // 创建一个新按钮
                    const newBtn = document.createElement('button');
                    newBtn.className = button.className;
                    newBtn.innerHTML = '<i class="fas fa-lightbulb"></i> 查看解析';
                    newBtn.setAttribute('data-exercise-id', exerciseId);

                    // 直接设置onclick事件处理
                    newBtn.onclick = function () {
                        const solutionId = 'solution-' + exerciseId;
                        const solution = document.getElementById(solutionId);

                        if (!solution) {
                            console.error(`【内联紧急修复】找不到解析 ${solutionId}`);
                            return false;
                        }

                        if (solution.classList.contains('show')) {
                            // 已经显示，需要隐藏
                            solution.classList.remove('show');
                            solution.style.display = 'none';
                            this.innerHTML = '<i class="fas fa-lightbulb"></i> 查看解析';
                        } else {
                            // 显示解析
                            solution.classList.add('show');
                            solution.style.display = 'block';
                            solution.style.maxHeight = 'none';
                            solution.style.overflow = 'visible';
                            this.innerHTML = '<i class="fas fa-eye-slash"></i> 隐藏解析';

                            // 延迟渲染公式
                            setTimeout(function () {
                                try {
                                    if (window.MathJax) {
                                        if (window.MathJax.typesetPromise) {
                                            window.MathJax.typesetPromise([solution]);
                                        } else if (window.MathJax.Hub) {
                                            window.MathJax.Hub.Queue(["Typeset", window.MathJax.Hub, solution]);
                                        }
                                    }
                                } catch (e) {
                                    console.error('渲染公式出错:', e);
                                }
                            }, 200);
                        }

                        return false;
                    };

                    // 替换原按钮
                    if (button.parentNode) {
                        button.parentNode.replaceChild(newBtn, button);
                        console.log(`【内联紧急修复】成功替换按钮 ${exerciseId}`);
                    }
                });
            }

            // 立即执行一次
            setTimeout(inlineFixButtons, 1000);

            // 以及在页面完全加载后
            window.addEventListener('load', function () {
                setTimeout(inlineFixButtons, 2000);
            });

            // 定期检查
            setInterval(inlineFixButtons, 5000);
        });
    </script>
