        .ai-analysis-btn i {
            margin-right: 6px;

        }

        /* 全屏按钮样式 */

            display: inline-flex;
            align-items: center;
            padding: 6px 14px;

            color: white;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;

            margin-left: 5px;

        }

        /* 知识点卡片标题样式调整 */

            background: var(--deepseek-primary);
            color: white;

            font-size: 1.2rem;
            font-weight: bold;

            padding: 10px 15px;

            padding: 10px 15px;
            border-radius: 18px 18px 18px 0;

    <!-- 加载指示器脚本 -->
    <script>
        // 页面加载进度指示器
        document.addEventListener('DOMContentLoaded', function () {
            // 创建加载指示器
            const indicator = document.createElement('div');
            indicator.className = 'loading-indicator';
            indicator.innerHTML = '<div class="loading-bar" id="loadingBar"></div>';
            document.body.appendChild(indicator);

            // 更新加载进度
            const loadingBar = document.getElementById('loadingBar');
            let progress = 10;

            // 初始进度
            loadingBar.style.width = progress + '%';

            // 模拟加载进度
            const progressInterval = setInterval(function () {
                // 缓慢增加进度，最多到90%
                if (progress < 90) {
                    progress += (90 - progress) / 10;
                    loadingBar.style.width = progress + '%';
                }
            }, 200);

            // 窗口加载完成时
            window.addEventListener('load', function () {
                loadingBar.style.width = '100%';

                // 加载完成后隐藏进度条
                setTimeout(function () {
                    indicator.style.opacity = '0';
                    setTimeout(function () {
                        indicator.remove();
                        clearInterval(progressInterval);
                    }, 300);
                }, 500);
            });
        });
    </script>

    <!-- 分类修复脚本 -->
    <script>
        document.addEventListener('DOMContentLoaded', function () {
            // 等待页面完全加载
            setTimeout(function () {
                console.log('正在修复分类显示...');
                try {
                    // 修复分类统计显示
                    const categoryButtons = document.querySelectorAll('.category-filter');
                    if (categoryButtons.length > 0) {
                        // 遍历所有分类按钮
                        categoryButtons.forEach(button => {
                            // 获取分类名称
                            const categoryName = button.getAttribute('data-category');
                            if (categoryName === '定积分应用') {
                                // 更新计数显示
                                const countSpan = button.querySelector('.count');
                                if (countSpan) {
                                    // 计算真正的应用题数量
                                    const applicationIds = [30, 31, 32, 33, 34, 37, 38, 39, 49, 50, 53, 58, 59, 66];
                                    countSpan.textContent = `(${applicationIds.length})`;
                                }
                            } else if (categoryName === '定积分') {
                                // 更新计数显示
                                const countSpan = button.querySelector('.count');
                                if (countSpan) {
                                    // 获取当前显示的数量
                                    const currentCount = parseInt(countSpan.textContent.replace(/[()]/g, ''));
                                    // 加上原来被错误分类的题目
                                    countSpan.textContent = `(${currentCount + 1})`;
                                }
                            }
                        });
                        console.log('分类显示修复完成');
                    }
                } catch (e) {
                    console.error('修复分类显示时出错:', e);
                }
            }, 1000);
        });
    </script>

    <!-- 资源加载器 -->
    <script>
        // 全局函数：优化公式中的斜杠处理
        function convertBackslashes(text) {
            if (!text) return text;

            // 检测是否是公式
            const isMathExpression = /\$.*\$|\\\(.*\\\)|\\\[.*\\\]|\$\$.*\$\$/s.test(text);

            if (isMathExpression) {
                // 替换单个反斜杠为双反斜杠，但排除已经是双反斜杠的情况
                let result = text;
                // 使用正则表达式查找所有单个反斜杠，但不是双反斜杠的部分
                result = result.replace(/(?<!\\)\\(?!\\)/g, '\\\\');
                return result;
            }

            return text;
        }

        // 资源加载器
        const ResourceLoader = {
            // 加载MathJax - 延迟加载以提高页面性能
            loadMathJax: function () {
                console.log('加载MathJax...');
                if (document.getElementById('MathJax-script')) return;

                const script = document.createElement('script');
                script.src = 'mathjax/es5/tex-mml-chtml.js';
                script.id = 'MathJax-script';
                script.async = true;
                script.onload = function () {
                    console.log('MathJax加载完成');
                };
                document.head.appendChild(script);
            }
        };

        // 页面内容加载后
        document.addEventListener('DOMContentLoaded', function () {
            // 延迟1秒加载MathJax，优先渲染页面框架
            setTimeout(ResourceLoader.loadMathJax, 1000);

            // 添加预先的按钮点击处理
            setTimeout(function () {
                // 为解析按钮添加点击事件
                const solutionButtons = document.querySelectorAll('.solution-toggle');
                solutionButtons.forEach(button => {
                    button.addEventListener('click', function () {
                        // 获取相关元素
                        const solutionId = this.getAttribute('data-solution');
                        const solutionContent = document.getElementById(solutionId);

                        // 切换显示状态
                        if (solutionContent) {
                            const isVisible = solutionContent.classList.contains('show');
                            if (isVisible) {
                                solutionContent.classList.remove('show');
                                this.innerHTML = '<i class="fas fa-lightbulb"></i> 查看解析';
                            } else {
                                solutionContent.classList.add('show');
                                this.innerHTML = '<i class="fas fa-eye-slash"></i> 隐藏解析';

                                // 确保MathJax重新渲染该容器中的公式
                                if (window.MathJax) {
                                    try {
                                        if (MathJax.typesetPromise) {
                                            MathJax.typesetPromise([solutionContent]).catch(err => {
                                                console.warn('MathJax渲染警告:', err);
                                            });
                                        } else if (MathJax.Hub) {
                                            MathJax.Hub.Queue(["Typeset", MathJax.Hub, solutionContent]);
                                        }
                                    } catch (err) {
                                        console.error('公式渲染出错:', err);
                                    }
                                }
                            }
                        }
                    });
                });

                // 为筛选按钮添加点击事件
                const filterButtons = document.querySelectorAll('.filter-btn');
                filterButtons.forEach(button => {
                    button.addEventListener('click', function () {
                        filterButtons.forEach(btn => btn.classList.remove('active'));
                        this.classList.add('active');

                        const filter = this.getAttribute('data-filter');
                        if (window.renderExercises) {
                            window.renderExercises(filter);
                        } else {
                            console.log('渲染函数未加载，保存筛选条件');
                            window.pendingFilter = filter;
                        }
                    });
                });
            }, 500);
        });
    </script>

    <!-- 错误处理脚本 -->
    <script>
        // 添加全局错误处理
        window.addEventListener('error', function (event) {
            console.error('全局错误:', event.message, 'at', event.filename, ':', event.lineno);
        });

        // 关键函数先定义在全局作用域
        // 筛选按钮处理函数
        window.filterButtonHandler = function (e) {
            e.preventDefault();

            // 获取所有筛选按钮
            const filterButtons = document.querySelectorAll('.filter-btn');

            // 移除所有按钮的active类
            filterButtons.forEach(btn => btn.classList.remove('active'));

            // 添加当前按钮的active类
            this.classList.add('active');

            // 获取筛选条件
            const filter = this.getAttribute('data-filter');

            // 使用渲染函数筛选习题
            if (window.renderExercises && typeof window.renderExercises === 'function') {
                window.renderExercises(filter);
            } else {
                console.log('渲染函数未加载，记录筛选条件');
                window.pendingFilter = filter;
            }
        };

        // 解析按钮处理函数
        window.solutionToggleHandler = function (e) {
            e.preventDefault();

            const exerciseId = this.getAttribute('data-exercise-id');
            console.log(`点击解析按钮: ${exerciseId}`);

            const solution = document.getElementById('solution-' + exerciseId);
            if (!solution) {
                console.error(`找不到解析容器: ${exerciseId}`);
                return;
            }

            // 切换显示状态
            const isVisible = solution.classList.contains('show');
            if (isVisible) {
                // 隐藏解析
                solution.classList.remove('show');
                solution.style.display = 'none';
                this.innerHTML = '<i class="fas fa-lightbulb"></i> 查看解析';
            } else {
                // 显示解析
                solution.classList.add('show');
                solution.style.display = 'block';
                solution.style.maxHeight = 'none';
                solution.style.overflow = 'visible';
                this.innerHTML = '<i class="fas fa-eye-slash"></i> 隐藏解析';

                // 确保MathJax重新渲染该容器中的公式
                if (window.MathJax) {
                    try {
                        if (MathJax.typesetPromise) {
                            MathJax.typesetPromise([solution]).catch(err => {
                                console.warn('MathJax渲染警告:', err);
                            });
                        } else if (MathJax.Hub) {
                            MathJax.Hub.Queue(["Typeset", MathJax.Hub, solution]);
                        }
                    } catch (err) {
                        console.error('公式渲染出错:', err);
                    }
                }

                // 如果是应用题，可能需要绘制图形
                const applicationIds = ['30', '31', '32', '33', '34', '37', '38', '39', '49', '50', '53', '58', '59'];
                if (applicationIds.includes(exerciseId)) {
                    // 确保公式正确渲染
                    if (window.MathJax) {
                        try {
                            if (MathJax.typesetPromise) {

    <!-- 添加紧急内联修复脚本，确保在脚本文件未被正确加载的情况下按钮也能工作 -->
    <script>
        // 直接在HTML中执行的紧急修复
        document.addEventListener('DOMContentLoaded', function () {
            console.log('【内联紧急修复】DOM已加载，准备修复解析按钮');

            function inlineFixButtons() {
                const buttons = document.querySelectorAll('.solution-toggle');
                console.log(`【内联紧急修复】找到 ${buttons.length} 个解析按钮`);

                buttons.forEach(function (button) {
                    // 跳过不定积分按钮
                    if (button.getAttribute('data-solution')) {
                        return;
                    }

                    // 获取题目ID
                    const exerciseId = button.getAttribute('data-exercise-id');
                    if (!exerciseId) {
                        return;
                    }

                    console.log(`【内联紧急修复】处理按钮 ${exerciseId}`);

                    // 创建一个新按钮
                    const newBtn = document.createElement('button');
                    newBtn.className = button.className;
                    newBtn.innerHTML = '<i class="fas fa-lightbulb"></i> 查看解析';
                    newBtn.setAttribute('data-exercise-id', exerciseId);

                    // 直接设置onclick事件处理
                    newBtn.onclick = function () {
                        const solutionId = 'solution-' + exerciseId;
                        const solution = document.getElementById(solutionId);

                        if (!solution) {
                            console.error(`【内联紧急修复】找不到解析 ${solutionId}`);
                            return false;
                        }

                        if (solution.classList.contains('show')) {
                            // 已经显示，需要隐藏
                            solution.classList.remove('show');
                            solution.style.display = 'none';
                            this.innerHTML = '<i class="fas fa-lightbulb"></i> 查看解析';
                        } else {
                            // 显示解析
                            solution.classList.add('show');
                            solution.style.display = 'block';
                            solution.style.maxHeight = 'none';
                            solution.style.overflow = 'visible';
                            this.innerHTML = '<i class="fas fa-eye-slash"></i> 隐藏解析';

                            // 延迟渲染公式
                            setTimeout(function () {
                                try {
                                    if (window.MathJax) {
                                        if (window.MathJax.typesetPromise) {
                                            window.MathJax.typesetPromise([solution]);
                                        } else if (window.MathJax.Hub) {
                                            window.MathJax.Hub.Queue(["Typeset", window.MathJax.Hub, solution]);
                                        }
                                    }
                                } catch (e) {
                                    console.error('渲染公式出错:', e);
                                }
                            }, 200);
                        }

                        return false;
                    };

                    // 替换原按钮
                    if (button.parentNode) {
                        button.parentNode.replaceChild(newBtn, button);
                        console.log(`【内联紧急修复】成功替换按钮 ${exerciseId}`);
                    }
                });
            }

            // 立即执行一次
            setTimeout(inlineFixButtons, 1000);

            // 以及在页面完全加载后
            window.addEventListener('load', function () {
                setTimeout(inlineFixButtons, 2000);
            });

            // 定期检查
            setInterval(inlineFixButtons, 5000);
        });
    </script>

    <!-- 增强公式处理脚本 -->
    <script>
        // 全局函数：优化公式中的斜杠处理，增强现有脚本
        document.addEventListener('DOMContentLoaded', function () {
            // 监听所有AI消息渲染
            const observer = new MutationObserver(function (mutations) {
                mutations.forEach(function (mutation) {
                    if (mutation.type === 'childList' && mutation.addedNodes.length > 0) {
                        mutation.addedNodes.forEach(function (node) {
                            if (node.nodeType === 1) { // 元素节点
                                // 检查是否是AI消息
                                if (node.classList && (node.classList.contains('deepseek-chat-ai') ||
                                    node.classList.contains('ai-message'))) {
                                    // 处理公式渲染
                                    processFormulasInNode(node);
                                }
                            }
                        });
                    }
                });
            });

            // 监听聊天容器的变化
            const chatContainer = document.getElementById('deepseek-chat-container');
            if (chatContainer) {
                observer.observe(chatContainer, { childList: true, subtree: true });
            }

            // 处理节点中的公式
            function processFormulasInNode(node) {
                // 获取文本内容
                let content = node.innerHTML;
                if (!content || !content.includes('$')) return;

                // 处理公式中的斜杠
                content = convertBackslashes(content);
                node.innerHTML = content;

                // 渲染公式
                if (window.MathJax) {
                    try {
                        if (MathJax.typesetPromise) {
                            MathJax.typesetPromise([node]).catch(function (err) {
                                console.warn('MathJax渲染警告:', err);
                            });
                        } else if (MathJax.Hub) {
                            MathJax.Hub.Queue(["Typeset", MathJax.Hub, node]);
                        }
                    } catch (err) {
                        console.error('渲染公式出错:', err);
                    }
                }
            }
        });
    </script>

                下一题 <i class="fas fa-chevron-right" style="margin-left: 6px;"></i>
            </button>
        </div>
    </div>

    <script>
        // 内嵌式全屏模式功能
        (function () {
            // 全局变量
            let exercises = [];
            let currentSlideIndex = 0;
            let typingSpeed = 30; // 毫秒/字符
            let isTyping = false;
            let typingTimeout = null;

            // 在页面加载完成后初始化全屏按钮
            document.addEventListener('DOMContentLoaded', function () {
                // 添加全屏按钮样式
                const style = document.createElement('style');
                style.textContent = `
                .fullscreen-btn {
                    display: inline-flex !important;
                    align-items: center !important;
                    padding: 8px 16px !important;
                    background: #3498db !important;
                    color: white !important;
                    border: none !important;
                    border-radius: 20px !important;
                    cursor: pointer !important;
                    font-size: 14px !important;
                    font-weight: 500 !important;
                    margin: 10px 0 !important;
                    margin-left: 5px !important;
                    transition: background-color 0.3s ease !important;
                }
                
                .fullscreen-btn:hover {
                    background-color: #2980b9 !important;
                }
                
                .fullscreen-btn i {
                    margin-right: 8px !important;
                    font-size: 16px !important;
                }
                
                /* 全屏模式样式 */
                .inline-slide {
                    background: white;
                    border-radius: 8px;
                    padding: 20px;
                    margin-bottom: 20px;
                    box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
                }
                
                .inline-exercise-header {
                    display: flex;
                    justify-content: space-between;
                    align-items: center;
                    margin-bottom: 20px;
                    padding-bottom: 15px;
                    border-bottom: 1px solid #e2e8f0;
                }
                
                .inline-exercise-title-wrapper {
                    display: flex;
                    align-items: center;
                    gap: 15px;
                }
                
                .inline-exercise-number {
                    background: #2c4cc3;
                    color: white;
                    width: 40px;
                    height: 40px;
                    border-radius: 50%;
                    display: flex;
                    align-items: center;
                    justify-content: center;
                    font-weight: bold;
                    font-size: 1.1rem;
                }
                
                .inline-exercise-title {
                    font-size: 1.5rem;
                    margin: 0;
                    color: #2c3e50;
                }
                
                .inline-exercise-meta {
                    display: flex;
                    gap: 10px;
                    flex-wrap: wrap;
                }
                
                .inline-exercise-tag {
                    padding: 4px 12px;
                    border-radius: 20px;
                    font-size: 0.85rem;
                    color: white;
                    display: flex;
                    align-items: center;
                }
                
                .inline-exercise-tag i {
                    margin-right: 6px;
                }
                
                .inline-exercise-tag.type {
                    background: #3498db;
                }
                
                .inline-exercise-tag.difficulty {
                    background: #e74c3c;
                }
                
                .inline-exercise-tag.category {
                    background: #9b59b6;
                }
                
                .inline-exercise-tag.method {
                    background: #34495e;
                }
                
                .inline-exercise-tag.difficulty.easy {
                    background: #2ecc71;
                }
                
                .inline-exercise-tag.difficulty.medium {
                    background: #f39c12;
                }
                
                .inline-exercise-tag.difficulty.hard {
                    background: #e74c3c;
                }
                
                .inline-exercise-question {
                    font-size: 1.2rem;
                    margin-bottom: 30px;
                    padding: 20px;
                    background: #f5f7fa;
                    border-radius: 8px;
                    box-shadow: 0 2px 6px rgba(0, 0, 0, 0.1);
                }
                
                .inline-solution-section {
                    position: relative;
                }
                
                .inline-toggle-solution-btn {
                    padding: 8px 16px;
                    background: #2c4cc3;
                    color: white;
                    border: none;
                    border-radius: 20px;
                    cursor: pointer;
                    font-size: 14px;
                    margin-bottom: 20px;
                    display: flex;
                    align-items: center;
                    gap: 6px;
                    transition: background 0.3s;
                }
                
                .inline-toggle-solution-btn:hover {
                    background: #1a3cb3;
                }
                
                .inline-solution-content {
                    background: white;
                    border-radius: 8px;
                    padding: 0;
                    overflow: hidden;
                    max-height: 0;
                    opacity: 0;
                    transition: max-height 0.5s, opacity 0.5s, padding 0.5s;
                }
                
                .inline-solution-content.show {
                    max-height: 2000px;
                    padding: 20px;
                    opacity: 1;
                    margin-bottom: 20px;
                    border: 1px solid #e2e8f0;
                    box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
                }
                
                .inline-solution-text {
                    white-space: pre-wrap;
                    display: inline;
                }
                
                .inline-typing-cursor {
                    display: inline-block;
                    width: 2px;
                    height: 20px;
                    background-color: #333;
                    margin-left: 2px;
                    animation: blink 0.7s infinite;
                }
                
                @keyframes blink {
                    0%, 100% { opacity: 1; }
                    50% { opacity: 0; }
                }
                
                .inline-explanation, .inline-answer {
                    margin-bottom: 25px;
                }
                
                .inline-explanation h4, .inline-answer h4 {
                    color: #2c4cc3;
                    display: flex;
                    align-items: center;
                    margin-top: 0;
                    margin-bottom: 10px;
                    font-size: 1.2rem;
                    padding-left: 10px;
                    border-left: 4px solid #2c4cc3;
                }
                
                .inline-explanation h4 i, .inline-answer h4 i {
                    margin-right: 8px;
                }
                
                .inline-image-container {
                    margin: 20px 0;
                    text-align: center;
                }
                
                .inline-solution-image {
                    max-width: 70%;
                    border-radius: 8px;
                    box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
                }
                
                /* 增强的打字光标样式 */
                .inline-typing-cursor {
                    display: inline-block;
                    width: 2px;
                    height: 1.2em;
                    background-color: #333;
                    margin-left: 2px;
                    vertical-align: middle;
                    animation: blink 0.7s infinite;
                }
                
                @keyframes blink {
                    0%, 100% { opacity: 1; }
                    50% { opacity: 0; }
                }
                
                /* 段落样式，提高可读性 */
                .inline-solution-text p,
                .inline-solution-text br + span {
                    margin-top: 0.8em;
                    display: block;
                }
                
                /* 为段落添加淡入效果 */
                .inline-solution-text span {
                    display: inline-block;
                    animation: fadeIn 0.3s ease;
                }
                
                @keyframes fadeIn {
                    from { opacity: 0; }
                    to { opacity: 1; }
                }
                
                /* 确保数学公式正确显示 */
                .inline-solution-text .MathJax {
                    margin: 0.5em 0;
                }
            `;
                document.head.appendChild(style);

                // 添加全屏按钮
                function addFullscreenButtons() {
                    // 查找所有习题操作区域
                    document.querySelectorAll('.exercise-item').forEach(exerciseItem => {
                        // 获取习题ID
                        const exerciseId = exerciseItem.getAttribute('data-id');
                        if (!exerciseId) return;

                        // 查找操作区域
                        let actionsDiv = exerciseItem.querySelector('.exercise-actions');

                        // 如果不存在操作区域，创建一个
                        if (!actionsDiv) {
                            const exerciseContent = exerciseItem.querySelector('.exercise-content');
                            if (!exerciseContent) return;

                            actionsDiv = document.createElement('div');
                            actionsDiv.className = 'exercise-actions';

                            // 在问题之后插入操作区域
                            const questionDiv = exerciseContent.querySelector('.exercise-question');
                            if (questionDiv) {
                                questionDiv.insertAdjacentElement('afterend', actionsDiv);
                            } else {
                                exerciseContent.appendChild(actionsDiv);
                            }
                        }

                        // 检查是否已经有全屏按钮
                        if (!actionsDiv.querySelector('.fullscreen-btn')) {
                            // 创建全屏按钮
                            const fullscreenBtn = document.createElement('button');
                            fullscreenBtn.className = 'fullscreen-btn';
                            fullscreenBtn.setAttribute('data-exercise-id', exerciseId);
                            fullscreenBtn.innerHTML = '<i class="fas fa-expand"></i> 全屏模式';

                            // 直接设置onclick事件处理
                            fullscreenBtn.onclick = function (e) {
                                e.preventDefault();
                                e.stopPropagation();

                                console.log('点击全屏按钮，习题ID:', exerciseId);

                                try {
                                    // 获取习题数据
                                    let exercisesData = [];
                                    if (window.ExerciseManager && Array.isArray(window.ExerciseManager.exercises)) {
                                        exercisesData = window.ExerciseManager.exercises;
                                        console.log('从ExerciseManager获取习题数据');
                                    } else if (window.exerciseData && Array.isArray(window.exerciseData.exercises)) {
                                        exercisesData = window.exerciseData.exercises;
                                        console.log('从exerciseData获取习题数据');
                                    } else {
                                        console.warn('无法找到习题数据');
                                        alert('无法找到习题数据，全屏模式可能无法正常工作');
                                        return;
                                    }

                                    // 直接使用
                                    showInlineFullscreen(exercisesData, exerciseId);
                                } catch (error) {
                                    console.error('全屏模式加载出错:', error);
                                    alert('全屏模式加载失败: ' + error.message);
                                }

                                return false;
                            };

                            // 添加到操作容器
                            actionsDiv.appendChild(fullscreenBtn);
                        }
                    });
                }

                // 初始化事件处理
                function initEventHandlers() {
                    // 关闭按钮
                    document.getElementById('inline-close-btn').addEventListener('click', function () {
                        document.getElementById('inline-fullscreen-container').style.display = 'none';
                        document.body.style.overflow = ''; // 恢复滚动
                    });

                    // 速度切换按钮
                    document.getElementById('inline-speed-btn').addEventListener('click', function () {
                        if (typingSpeed === 30) {
                            typingSpeed = 10; // 快速
                            this.innerHTML = '<i class="fas fa-tachometer-alt" style="margin-right: 6px;"></i> 快速打字';
                        } else if (typingSpeed === 10) {
                            typingSpeed = 0; // 立即显示
                            this.innerHTML = '<i class="fas fa-tachometer-alt" style="margin-right: 6px;"></i> 立即显示';
                        } else {
                            typingSpeed = 30; // 标准
                            this.innerHTML = '<i class="fas fa-tachometer-alt" style="margin-right: 6px;"></i> 标准速度';
                        }

                        // 如果当前正在显示解析，重新开始打字效果
                        const currentSlide = document.getElementById(`inline-slide-${currentSlideIndex}`);
                        if (currentSlide) {
                            const solutionContent = currentSlide.querySelector('.inline-solution-content.show');
                            if (solutionContent) {
                                const solutionText = currentSlide.querySelector('.inline-solution-text');
                                const cursor = currentSlide.querySelector('.inline-typing-cursor');
                                const exercise = exercises[currentSlideIndex];

                                if (typingSpeed === 0) {
                                    // 立即显示全部
                                    solutionText.innerHTML = exercise.explanation;
                                    cursor.style.display = 'none';

                                    // 重新渲染公式
                                    if (window.MathJax && window.MathJax.typesetPromise) {
                                        window.MathJax.typesetPromise([solutionContent])
                                            .catch(err => console.warn('MathJax渲染错误:', err));
                                    }
                                } else {
                                    // 重新开始打字效果
                                    if (isTyping) {
                                        clearTimeout(typingTimeout);
                                        isTyping = false;
                                    }
                                    startTypingEffect(solutionText, cursor, exercise.explanation, currentSlideIndex);
                                }
                            }
                        }
                    });

                    // 上一题按钮
                    document.getElementById('inline-prev-slide').addEventListener('click', function () {
                        if (currentSlideIndex > 0) {
                            goToSlide(currentSlideIndex - 1);
                        }
                    });

                    // 下一题按钮
                    document.getElementById('inline-next-slide').addEventListener('click', function () {
                        if (currentSlideIndex < exercises.length - 1) {
                            goToSlide(currentSlideIndex + 1);
                        }
                    });

                    // 键盘事件
                    document.addEventListener('keydown', function (e) {
                        // 只有在全屏模式显示时才处理
                        if (document.getElementById('inline-fullscreen-container').style.display !== 'flex') {
                            return;
                        }

                        if (e.key === 'ArrowLeft') {
                            // 左箭头 - 上一题
                            if (currentSlideIndex > 0) {
                                goToSlide(currentSlideIndex - 1);
                            }
                        } else if (e.key === 'ArrowRight' || e.key === ' ') {
                            // 右箭头或空格 - 下一题
                            if (currentSlideIndex < exercises.length - 1) {
                                goToSlide(currentSlideIndex + 1);
                            }
                        } else if (e.key === 'Escape') {
                            // ESC - 关闭全屏
                            document.getElementById('inline-fullscreen-container').style.display = 'none';
                            document.body.style.overflow = ''; // 恢复滚动
                        }
                    });
                }

                // 显示内嵌全屏模式
                function showInlineFullscreen(exercisesData, initialExerciseId) {
                    // 保存习题数据
                    exercises = exercisesData;

                    // 查找初始习题索引
                    let initialIndex = 0;
                    if (initialExerciseId) {
                        const index = exercises.findIndex(ex => ex.id == initialExerciseId);
                        if (index !== -1) {
                            initialIndex = index;
                        }
                    }
                    currentSlideIndex = initialIndex;

                    // 渲染幻灯片
                    renderSlides();

                    // 显示全屏容器
                    const container = document.getElementById('inline-fullscreen-container');
                    container.style.display = 'flex';

                    // 锁定背景滚动
                    document.body.style.overflow = 'hidden';

                    // 滚动到顶部
                    container.scrollTop = 0;

                    // 更新计数器
                    updateCounter();

                    // 更新导航按钮状态
                    updateNavButtons();
                }

                // 渲染所有幻灯片
                function renderSlides() {
                    const container = document.getElementById('inline-slide-container');
                    container.innerHTML = '';

                    exercises.forEach((exercise, index) => {
                        const slide = document.createElement('div');
                        slide.className = `inline-slide ${index === currentSlideIndex ? '' : 'slide-hidden'}`;
                        slide.id = `inline-slide-${index}`;
                        slide.style.display = index === currentSlideIndex ? 'block' : 'none';

                        // 获取难度文本
                        const difficultyText = getDifficultyText(exercise.difficulty);

                        // 判断是否需要显示图片
                        const needsPlot = ['30', '31', '32', '33', '34', '37', '38', '39', '49', '50'].includes(exercise.id.toString());

                        slide.innerHTML = `
                        <div class="inline-exercise-header">
                            <div class="inline-exercise-title-wrapper">
                                <div class="inline-exercise-number">${exercise.id}</div>
                                <h3 class="inline-exercise-title">${exercise.title}</h3>
                            </div>
                            <div class="inline-exercise-meta">
                                <div class="inline-exercise-tag type"><i class="fas fa-tag"></i> ${exercise.type}</div>
                                <div class="inline-exercise-tag difficulty ${exercise.difficulty}"><i class="fas fa-signal"></i> ${difficultyText}</div>
                                <div class="inline-exercise-tag category"><i class="fas fa-folder"></i> ${exercise.category}</div>
                                ${exercise.method ? `<div class="inline-exercise-tag method"><i class="fas fa-cogs"></i> ${exercise.method}</div>` : ''}
                            </div>
                        </div>
                        <div class="inline-exercise-question">${exercise.question}</div>
                        <div class="inline-solution-section">
                            <button class="inline-toggle-solution-btn" data-slide="${index}">
                                <i class="fas fa-lightbulb"></i> 显示解析
                            </button>
                            <div class="inline-solution-content" id="inline-solution-${index}">
                                ${needsPlot ? `
                                <div class="inline-image-container">
                                    <img src="../images/plots/plot-${exercise.id}.png" alt="函数图像" class="inline-solution-image">
                                </div>
                                ` : ''}
                                <div class="inline-explanation">
                                    <h4><i class="fas fa-chalkboard-teacher"></i> 解析</h4>
                                    <div class="inline-explanation-text">
                                        <div class="inline-solution-text" id="inline-solution-text-${index}"></div>
                                        <span class="inline-typing-cursor" id="inline-cursor-${index}" style="display: none;"></span>
                                    </div>
                                </div>
                                <div class="inline-answer">
                                    <h4><i class="fas fa-check-circle"></i> 答案</h4>
                                    <div>${exercise.answer}</div>
                                </div>
                            </div>
                        </div>
                    `;

                        container.appendChild(slide);
                    });

                    // 给每个解析按钮添加点击事件
                    document.querySelectorAll('.inline-toggle-solution-btn').forEach(btn => {
                        btn.addEventListener('click', function () {
                            const slideIndex = parseInt(this.getAttribute('data-slide'));
                            const solutionContent = document.getElementById(`inline-solution-${slideIndex}`);
                            const solutionText = document.getElementById(`inline-solution-text-${slideIndex}`);
                            const cursor = document.getElementById(`inline-cursor-${slideIndex}`);

                            if (!solutionContent) {
                                console.error('Solution content DOM element not found.');
                                return; // Exit if the main content area is missing
                            }

                            if (solutionContent.classList.contains('user-clicked')) {
                                // Action: Hide the solution
                                solutionContent.classList.remove('user-clicked', 'show'); // Remove 'user-clicked' and 'show' (if present)

                                // Apply styles to hide (these mirror the default CSS state for .inline-solution-content)
                                solutionContent.style.maxHeight = '0';
                                solutionContent.style.opacity = '0';
                                solutionContent.style.padding = '0';
                                solutionContent.style.visibility = 'hidden';
                                // solutionContent.style.display = 'none'; // CSS without user-clicked should already handle this.

                                this.innerHTML = '<i class="fas fa-lightbulb"></i> 显示解析'; // Update button text/icon

                                // Stop any ongoing typing animation
                                if (window.isTyping) {
                                    clearTimeout(window.typingTimeout);
                                    window.isTyping = false;
                                }
                                if (cursor) { // Check if cursor element exists
                                    cursor.style.display = 'none';
                                }

                            } else {
                                // Action: Show the solution
                                solutionContent.classList.add('user-clicked'); // Add 'user-clicked' to trigger CSS for showing

                                // Apply styles to show (these mirror the CSS for .inline-solution-content.user-clicked)
                                solutionContent.style.maxHeight = '2000px'; // Or a more dynamic value like 'none' or scrollHeight if calculated
                                solutionContent.style.opacity = '1';
                                solutionContent.style.padding = '20px';
                                solutionContent.style.visibility = 'visible';
                                solutionContent.style.display = 'block'; // Ensure it's displayed as a block

                                this.innerHTML = '<i class="fas fa-eye-slash"></i> 隐藏解析'; // Update button text/icon

                                // Retrieve the exercise data for the current slide
                                const exercises = window.fullscreenExercises || []; // Use global exercises data
                                const exercise = exercises[slideIndex];

                                if (!exercise) {
                                    console.error('Cannot find exercise data for slide index:', slideIndex);
                                    if (solutionText) { // Check if solutionText element exists
                                        // Display error directly if data is missing
                                        solutionText.innerHTML = "错误：无法加载解析内容。";
                                    }
                                    return; // Exit if no exercise data
                                }
                                const exerciseExplanation = exercise.explanation;

                                // Ensure solutionText and cursor elements are valid before using them
                                if (solutionText && cursor) {
                                    if (window.typingSpeed === 0) {
                                        // Immediate display of the full explanation
                                        solutionText.innerHTML = exerciseExplanation; // Consider using a sanitizer or careful formatting if explanation contains HTML
                                        cursor.style.display = 'none';

                                        // Re-render MathJax formulas for the immediately displayed content
                                        if (window.MathJax) {
                                            if (window.MathJax.typesetPromise) {
                                                window.MathJax.typesetPromise([solutionContent])
                                                    .catch(err => console.warn('MathJax rendering error (immediate display):', err));
                                            } else if (window.MathJax.Hub) {
                                                window.MathJax.Hub.Queue(["Typeset", window.MathJax.Hub, solutionContent]);
                                            }
                                        }
                                    } else {
                                        // Start the typing animation effect
                                        if (typeof window.startTypingEffect === 'function') {
                                            window.startTypingEffect(solutionText, cursor, exerciseExplanation, slideIndex);
                                        } else {
                                            console.error("startTypingEffect function is not defined. Displaying content directly.");
                                            // Fallback: display content directly if typing effect function is missing
                                            solutionText.innerHTML = exerciseExplanation;
                                            if (cursor) cursor.style.display = 'none';
                                            // Also render MathJax in this fallback case
                                            if (window.MathJax) {
                                                if (window.MathJax.typesetPromise) {
                                                    window.MathJax.typesetPromise([solutionContent])
                                                        .catch(err => console.warn('MathJax rendering error (fallback display):', err));
                                                } else if (window.MathJax.Hub) {
                                                    window.MathJax.Hub.Queue(["Typeset", window.MathJax.Hub, solutionContent]);
                                                }
                                            }
                                        }
                                    }
                                } else {
                                    console.error("Solution text or cursor DOM element not found for typing effect. Content may not display correctly.");
                                    // Fallback if essential elements for typing are missing: try to display explanation directly in solutionContent
                                    solutionContent.innerHTML = `<div class="inline-explanation"><h4><i class="fas fa-chalkboard-teacher"></i> 解析</h4><div class="explanation-content">${exerciseExplanation}</div></div>`; // Basic structure
                                    if (window.MathJax) { // Try to render MathJax anyway
                                        if (window.MathJax.typesetPromise) {
                                            window.MathJax.typesetPromise([solutionContent]).catch(err => console.warn('MathJax rendering error (elements missing fallback):', err));
                                        } else if (window.MathJax.Hub) {
                                            window.MathJax.Hub.Queue(["Typeset", window.MathJax.Hub, solutionContent]);
                                        }
                                    }
                                }
                            }
                        });
                    });

                    // 渲染数学公式
                    if (window.MathJax && window.MathJax.typesetPromise) {
                        window.MathJax.typesetPromise()
                            .catch(err => console.warn('MathJax渲染错误:', err));
                    }
                }

                // 切换到指定幻灯片
                function goToSlide(index) {
                    if (index < 0 || index >= exercises.length) return;

                    // 更新当前幻灯片索引
                    const prevIndex = currentSlideIndex;
                    currentSlideIndex = index;

                    // 更新幻灯片显示
                    const prevSlide = document.getElementById(`inline-slide-${prevIndex}`);
                    const currentSlide = document.getElementById(`inline-slide-${index}`);

                    if (prevSlide) prevSlide.style.display = 'none';
                    if (currentSlide) currentSlide.style.display = 'block';

                    // 更新计数器和导航按钮
                    updateCounter();
                    updateNavButtons();

                    // 重置行计数和解析显示状态
                    window.currentLine = 0;
                    window.totalLines = 0;
                    window.solutionLines = [];

                    // 隐藏解析
                    const prevSolution = document.getElementById(`inline-solution-${prevIndex}`);
                    const prevButton = document.querySelector(`.inline-toggle-solution-btn[data-slide="${prevIndex}"]`);

                    if (prevSolution && prevSolution.classList.contains('show')) {
                        prevSolution.classList.remove('show');
                        if (prevButton) prevButton.innerHTML = '<i class="fas fa-lightbulb"></i> 显示解析';
                    }

                    // 滚动到顶部
                    document.getElementById('inline-slide-container').scrollTop = 0;

                    // 渲染数学公式
                    if (window.MathJax && window.MathJax.typesetPromise) {
                        window.MathJax.typesetPromise([currentSlide])
                            .catch(err => console.warn('MathJax渲染错误:', err));
                    }
                }

                // 全局变量，用于跟踪当前显示的行
                window.currentLine = 0;
                window.totalLines = 0;
                window.solutionLines = [];

                /**
                 * 按行显示解析内容的函数
                 * @param {number} slideIndex - 当前幻灯片的索引
                 * @param {boolean} isClick - 是否由点击事件触发
                 */
                function showNextLine(slideIndex, isClick = false) {
                    // 获取解析文本元素
                    const solutionText = document.getElementById(`inline-solution-text-${slideIndex}`);
                    if (!solutionText) {
                        console.error('找不到解析文本元素，slideIndex:', slideIndex);
                        return;
                    }

                    // 初始化行数据（如果是第一次调用）
                    if (window.currentLine === 0 || !window.solutionLines?.length) {
                        if (!initializeSolutionLines(slideIndex, solutionText)) {
                            return; // 初始化失败则退出
                        }
                    }


                    // 显示下一行内容（如果还有未显示的行）
                    if (window.currentLine < window.totalLines) {
                        displayNextLine(slideIndex, solutionText, isClick);
                    } else if (window.currentLine >= window.totalLines && window.totalLines > 0) {
                        // 所有行已显示完毕，更新按钮状态
                        updateToggleButton(slideIndex, true);
                    }
                }


                /**
                 * 初始化解析行数据
                 * @param {number} slideIndex - 当前幻灯片的索引
                 * @param {HTMLElement} solutionText - 解析文本容器元素
                 * @returns {boolean} 初始化是否成功
                 */
                function initializeSolutionLines(slideIndex, solutionText) {
                    // 验证习题数据
                    if (!window.fullscreenExercises || !Array.isArray(window.fullscreenExercises)) {
                        console.error('习题数据未正确加载');
                        return false;
                    }


                    // 验证slideIndex范围
                    if (slideIndex < 0 || slideIndex >= window.fullscreenExercises.length) {
                        console.error('无效的slideIndex:', slideIndex);
                        return false;
                    }


                    // 获取当前习题
                    const exercise = window.fullscreenExercises[slideIndex];
                    if (!exercise?.explanation) {
                        console.error('找不到习题数据或解析内容，slideIndex:', slideIndex);
                        return false;
                    }


                    try {
                        // 分割解析内容为行，按句子或换行符分割
                        window.solutionLines = exercise.explanation
                            .split(/(?<=[.!?])\s+|(?<=\n)\s*(?=\S)/g)
                            .filter(p => p?.trim().length > 0);
                        
                        window.totalLines = window.solutionLines.length;
                        window.currentLine = 0; // 重置当前行索引
                        
                        // 清空解析文本区域
                        solutionText.innerHTML = '';
                        
                        // 更新按钮文本
                        updateToggleButton(slideIndex, false);
                        
                        return true;
                    } catch (error) {
                        console.error('初始化解析行数据时出错:', error);
                        return false;
                    }
                }


                /**
                 * 显示下一行内容
                 * @param {number} slideIndex - 当前幻灯片的索引
                 * @param {HTMLElement} solutionText - 解析文本容器元素
                 * @param {boolean} isClick - 是否由点击事件触发
                 */
                function displayNextLine(slideIndex, solutionText, isClick) {
                    try {
                        // 获取当前行内容
                        const lineContent = window.solutionLines[window.currentLine];
                        if (!lineContent) {
                            console.warn('未找到当前行的内容');
                            return;
                        }
                        
                        // 创建并添加新行
                        const newParagraph = document.createElement('div');
                        newParagraph.className = 'solution-paragraph';
                        newParagraph.innerHTML = lineContent;
                        solutionText.appendChild(newParagraph);
                        
                        // 更新行计数
                        window.currentLine++;
                        
                        // 更新按钮状态
                        updateToggleButton(slideIndex, false);
                        
                        // 渲染数学公式
                        if (window.MathJax?.typesetPromise) {
                            window.MathJax.typesetPromise([solutionText])
                                .catch(err => console.warn('MathJax渲染错误:', err));
                        }
                        
                        // 自动滚动到新内容（仅在点击时）
                        if (isClick) {
                            requestAnimationFrame(() => {
                                solutionText.scrollIntoView({ behavior: 'smooth', block: 'end' });
                            });
                        }
                    } catch (error) {
                        console.error('显示下一行内容时出错:', error);
                    }
                }


                /**
                 * 更新切换按钮状态
                 * @param {number} slideIndex - 当前幻灯片的索引
                 * @param {boolean} isComplete - 是否已完全显示所有内容
                 */
                function updateToggleButton(slideIndex, isComplete) {
                    try {
                        const toggleButton = document.querySelector(`.inline-toggle-solution-btn[data-slide="${slideIndex}"]`);
                        if (!toggleButton) {
                            console.warn('未找到切换按钮，slideIndex:', slideIndex);
                            return;
                        }
                        
                        // 根据状态更新按钮文本和图标
                        if (isComplete || window.currentLine >= window.totalLines) {
                            toggleButton.innerHTML = '<i class="fas fa-check-circle"></i> 解析已完全显示';
                        } else {
                            toggleButton.innerHTML = `
                                <i class="fas fa-arrow-down"></i> 
                                显示下一行 (${window.currentLine}/${window.totalLines})
                            `.trim();
                        }
                    } catch (error) {
                        console.error('更新切换按钮状态时出错:', error);
                    }
                }

                // 隐藏解析内容并重置行计数的函数
                function resetSolutionDisplay(exerciseId) {
                    window.currentLine = 0;
                    window.totalLines = 0;
                    window.solutionLines = [];

                    const solutionText = document.getElementById(`inline-solution-text-${exerciseId}`);
                    if (solutionText) {
                        solutionText.innerHTML = '';
                    }

                    // 更新按钮文本
                    const toggleButton = document.querySelector(`.inline-toggle-solution-btn[data-slide="${window.currentSlideIndex}"]`);
                    if (toggleButton) {
                        toggleButton.innerHTML = '<i class="fas fa-lightbulb"></i> 显示解析';
                    }
                }

                // 禁用原有的打字效果函数
                window.startTypingEffect = function () {
                    console.log('打字效果已禁用，使用按行显示');
                    return;
                };

                // 更新计数器
                function updateCounter() {
                    document.getElementById('inline-current-slide').textContent = currentSlideIndex + 1;
                    document.getElementById('inline-total-slides').textContent = exercises.length;
                }

                // 更新导航按钮状态
                function updateNavButtons() {
                    document.getElementById('inline-prev-slide').disabled = currentSlideIndex === 0;
                    document.getElementById('inline-next-slide').disabled = currentSlideIndex === exercises.length - 1;
                }

                // 获取难度文本
                function getDifficultyText(difficulty) {
                    switch (difficulty) {
                        case 'easy': return '简单';
                        case 'medium': return '中等';
                        case 'hard': return '困难';
                        default: return '中等';
                    }
                }

                // 初始化事件处理
                initEventHandlers();

                // 定期添加全屏按钮，确保即使DOM动态变化也能添加按钮
                setInterval(addFullscreenButtons, 2000);

                // 立即添加全屏按钮
                setTimeout(addFullscreenButtons, 1000);
            });
        })();

                    <div class="inline-solution-section">
                        <button class="inline-toggle-solution-btn" data-slide="${initialIndex}">

                        </button>
                        <div class="inline-solution-content" id="inline-solution-${initialIndex}">
                            ${needsPlot ? `
                            <div class="inline-image-container">
                                <img src="../images/plots/plot-${exercise.id}.png" alt="函数图像" class="inline-solution-image">
                            </div>
                            ` : ''}
                            <div class="inline-explanation">
                                <h4><i class="fas fa-chalkboard-teacher"></i> 解析</h4>
                                <div class="inline-explanation-text">
                                    <div class="inline-solution-text" id="inline-solution-text-${initialIndex}"></div>
                                    <span class="inline-typing-cursor" id="inline-cursor-${initialIndex}" style="display: none;"></span>
                                </div>

                `;

                        // 确保解析内容是隐藏的
                        const solutionContent = slideContainer.querySelector('.inline-solution-content');
                        if (solutionContent) {
                            solutionContent.classList.remove('show', 'user-clicked');
                            solutionContent.style.maxHeight = '0';
                            solutionContent.style.opacity = '0';
                            solutionContent.style.padding = '0';
                            solutionContent.style.visibility = 'hidden';
                        }
                    }

                    // 显示全屏容器
                    container.style.display = 'flex';

                    // 锁定背景滚动
                    document.body.style.overflow = 'hidden';

                    // 更新计数器
                    document.getElementById('inline-current-slide').textContent = initialIndex + 1;
                    document.getElementById('inline-total-slides').textContent = exercisesData.length;

                    // 设置导航按钮状态
                    setupNavigationButtons(exercisesData);

                    // 渲染公式
                    setTimeout(function () {
                        if (window.MathJax && window.MathJax.typesetPromise) {
                            window.MathJax.typesetPromise([container])
                                .catch(err => console.warn('MathJax渲染错误:', err));
                        }

                        // 修复解析按钮
                        fixInlineButtons();
                    }, 100);

                    console.log('全屏模式已显示');
                } catch (error) {
                    console.error('显示全屏模式出错:', error);
                    alert('全屏模式出错: ' + error.message);
                }
            };

            // 辅助函数：获取难度文本
            function getDifficultyText(difficulty) {
                switch (difficulty) {
                    case 'easy': return '简单';
                    case 'medium': return '中等';
                    case 'hard': return '困难';
                    default: return '中等';
                }
            }

            // 设置导航按钮
            function setupNavigationButtons(exercisesData) {
                const prevBtn = document.getElementById('inline-prev-slide');
                const nextBtn = document.getElementById('inline-next-slide');
                const currentIndex = window.currentSlideIndex || 0;

                if (prevBtn) {
                    prevBtn.disabled = currentIndex === 0;
                    prevBtn.onclick = function () {
                        if (currentIndex > 0) {
                            window.showInlineFullscreen(exercisesData, exercisesData[currentIndex - 1].id);
                        }
                    };
                }

                if (nextBtn) {
                    nextBtn.disabled = currentIndex >= exercisesData.length - 1;
                    nextBtn.onclick = function () {
                        if (currentIndex < exercisesData.length - 1) {
                            window.showInlineFullscreen(exercisesData, exercisesData[currentIndex + 1].id);
                        }
                    };
                }
            }

            // 速度切换按钮
            const speedBtn = document.getElementById('inline-speed-btn');
            if (speedBtn) {
                speedBtn.onclick = function () {
                    if (window.typingSpeed === 30) {
                        window.typingSpeed = 10; // 快速
                        this.innerHTML = '<i class="fas fa-tachometer-alt" style="margin-right: 6px;"></i> 快速显示';
                    } else {
                        window.typingSpeed = 30; // 标准
                        this.innerHTML = '<i class="fas fa-tachometer-alt" style="margin-right: 6px;"></i> 标准显示';
                    }
                };
            }

            // 修复解析按钮点击事件
            function fixSolutionButtons() {
                console.log('修复解析按钮...');
                document.querySelectorAll('.solution-toggle').forEach(button => {
                    // 跳过已经修复过的按钮
                    if (button.hasAttribute('data-fixed')) return;

                    // 获取题目ID
                    const exerciseId = button.getAttribute('data-exercise-id');
                    if (!exerciseId) return;

                    console.log('修复解析按钮:', exerciseId);

                    // 标记已修复
                    button.setAttribute('data-fixed', 'true');

                    // 确保相关解析内容是隐藏的
                    const solutionId = 'solution-' + exerciseId;
                    const solution = document.getElementById(solutionId);
                    if (solution) {
                        // 强制隐藏所有解析内容，确保只有点击后才显示
                        solution.classList.remove('show', 'user-clicked');
                        solution.style.display = 'none';
                        solution.style.opacity = '0';
                        solution.style.maxHeight = '0';
                        solution.style.overflow = 'hidden';
                        solution.style.visibility = 'hidden';
                    }

                    // 清除旧事件
                    const newBtn = button.cloneNode(true);
                    if (button.parentNode) {
                        button.parentNode.replaceChild(newBtn, button);
                    }

                    // 添加新事件处理
                    newBtn.onclick = function (e) {
                        e.preventDefault();
                        e.stopPropagation();

                        const solutionId = 'solution-' + exerciseId;
                        const solution = document.getElementById(solutionId);

                        if (!solution) {
                            console.error('找不到解析容器:', solutionId);
                            return false;
                        }

                        // 切换用户点击状态
                        if (solution.classList.contains('user-clicked')) {
                            // 隐藏解析
                            solution.classList.remove('user-clicked', 'show');
                            solution.style.display = 'none';
                            solution.style.opacity = '0';
                            solution.style.maxHeight = '0';
                            solution.style.overflow = 'hidden';
                            solution.style.visibility = 'hidden';
                            this.innerHTML = '<i class="fas fa-lightbulb"></i> 查看解析';
                        } else {
                            // 显示解析
                            solution.classList.add('user-clicked');
                            solution.style.display = 'block';
                            solution.style.maxHeight = 'none';
                            solution.style.opacity = '1';
                            solution.style.overflow = 'visible';
                            solution.style.visibility = 'visible';
                            this.innerHTML = '<i class="fas fa-eye-slash"></i> 隐藏解析';

                            // 确保MathJax重新渲染该容器中的公式
                            if (window.MathJax) {
                                try {
                                    if (MathJax.typesetPromise) {
                                        MathJax.typesetPromise([solution]).catch(err => {
                                            console.warn('MathJax渲染警告:', err);
                                        });
                                    } else if (MathJax.Hub) {
                                        MathJax.Hub.Queue(["Typeset", MathJax.Hub, solution]);
                                    }
                                } catch (err) {
                                    console.error('公式渲染出错:', err);
                                }
                            }
                        }

                        return false;
                    };
                });
            }

            // 修复内联全屏解析按钮
            function fixInlineButtons() {
                document.querySelectorAll('.inline-toggle-solution-btn').forEach(btn => {
                    // 跳过已经修复过的按钮
                    if (btn.hasAttribute('data-fixed')) return;

                    // 标记已修复
                    btn.setAttribute('data-fixed', 'true');
                    
                    // 获取滑动索引
                    const slideIndex = parseInt(btn.getAttribute('data-slide'));
                    const solutionContent = document.getElementById(`inline-solution-${slideIndex}`);

                    if (solutionContent) {
                        // 初始化解析内容样式
                        resetSolutionDisplay(slideIndex);
                        
                        // 添加点击事件监听器到解析内容区域
                        solutionContent.addEventListener('click', function(e) {
                            // 阻止事件冒泡，避免触发其他事件
                            e.preventDefault();
                            e.stopPropagation();
                            
                            // 不触发的情况：如果点击的是按钮或按钮的子元素
                            if (e.target.tagName === 'BUTTON' || 
                                e.target.closest('button') || 
                                e.target.classList.contains('inline-toggle-solution-btn')) {
                                return;
                            }
                            
                            // 只有当解析内容已显示时才显示下一行
                            if (this.classList.contains('user-clicked')) {
                                showNextLine(slideIndex, true);
                            }
                        });
                    }


                    // 清除旧事件
                    const newBtn = btn.cloneNode(true);
                    if (btn.parentNode) {
                        btn.parentNode.replaceChild(newBtn, btn);
                    }

                    // 添加新事件处理
                    newBtn.onclick = function (e) {
                        e.preventDefault();
                        e.stopPropagation();

                        const slideIndex = parseInt(this.getAttribute('data-slide'));
                        const solutionContent = document.getElementById(`inline-solution-${slideIndex}`);

                        if (!solutionContent) {
                            console.error('找不到解析容器:', slideIndex);
                            return;
                        }


                        // 使用user-clicked类切换显示状态
                        if (solutionContent.classList.contains('user-clicked')) {
                            // 隐藏解析
                            resetSolutionDisplay(slideIndex);
                            this.innerHTML = '<i class="fas fa-lightbulb"></i> 显示解析';
                        } else {
                            // 显示解析
                            solutionContent.classList.add('user-clicked');
                            solutionContent.style.maxHeight = '2000px';
                            solutionContent.style.opacity = '1';
                            solutionContent.style.padding = '20px';
                            solutionContent.style.visibility = 'visible';

                            // 解析内容已显示，使用按行显示功能
                            showNextLine(slideIndex, true);
                        }
                    };
                });
            }

            // 重新绑定所有全屏按钮的点击事件
            function rebindFullscreenButtons() {
                console.log('重新绑定全屏按钮...');
                document.querySelectorAll('.fullscreen-btn').forEach(btn => {
                    // 移除旧事件
                    const clone = btn.cloneNode(true);
                    if (btn.parentNode) {
                        btn.parentNode.replaceChild(clone, btn);
                    }

                    // 添加新事件
                    clone.addEventListener('click', function (e) {
                        e.preventDefault();
                        e.stopPropagation();

                        const exerciseId = this.getAttribute('data-exercise-id');
                        console.log('点击全屏按钮，习题ID:', exerciseId);

                        // 获取习题数据
                        let exercisesData = [];
                        if (window.ExerciseManager && Array.isArray(window.ExerciseManager.exercises)) {
                            exercisesData = window.ExerciseManager.exercises;
                            console.log('从ExerciseManager获取习题数据');
                        } else if (window.exerciseData && Array.isArray(window.exerciseData.exercises)) {
                            exercisesData = window.exerciseData.exercises;
                            console.log('从exerciseData获取习题数据');
                        } else {
                            console.warn('无法找到习题数据');
                            alert('无法找到习题数据，全屏模式可能无法正常工作');
                            return;
                        }

                        // 调用全屏函数
                        window.showInlineFullscreen(exercisesData, exerciseId);
                    });
                });
            }

            // 在页面加载完成后执行
            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', function () {
                    setTimeout(rebindFullscreenButtons, 1000);
                });
            } else {
                setTimeout(rebindFullscreenButtons, 500);
            }

            // 定期检查并重新绑定全屏按钮
            setInterval(rebindFullscreenButtons, 3000);

            console.log('全屏功能修复脚本已加载');
        })();

                const paragraphs = text.split(/(?<=[.!?])\s+|(?<=\n)\s*(?=\S)/g)
                    .filter(p => p.trim().length > 0);  // 移除空段落

                let currentParagraph = 0;
                let currentHTML = '';

                // 显示下一个段落的函数
                function displayNextParagraph() {
                    if (currentParagraph < paragraphs.length && window.isTyping) {

                        // 检查段落是否包含数学公式
                        const hasMathFormula = /(\$\$[\s\S]*?\$\$|\$[^\$\n]+\$)/.test(paragraph);

                                .catch(err => console.warn('MathJax渲染错误:', err));
                        }
                    }

                            document.querySelectorAll('.solution-content:not(.user-clicked), .inline-solution-content:not(.user-clicked)').forEach(solution => {
                                solution.classList.remove('show');
                                solution.style.display = 'none';
                                solution.style.opacity = '0';
                                solution.style.maxHeight = '0';
                                solution.style.overflow = 'hidden';
                                solution.style.visibility = 'hidden';
                            });

                            // 修复新添加的按钮
                            fixSolutionButtons();
                            fixInlineButtons();
                        }, 10);
                    }
                });

                // 配置观察选项
                const config = {
                    childList: true,      // 观察子节点的添加或删除
                    subtree: true,        // 观察所有后代节点
                    attributes: true,     // 观察属性变化
                    attributeFilter: ['class', 'style'] // 只关注class和style属性变化
                };

                // 开始观察整个文档
                observer.observe(document.body, config);
            }

            // 初始化函数
            function init() {
                console.log('初始化解析显示修复...');

                // 强制隐藏所有解析内容
                forceHideAllSolutions();

                // 修复普通解析按钮
                fixSolutionButtons();

                // 修复内联全屏解析按钮
                fixInlineButtons();

                // 设置DOM观察器
                setupDOMObserver();

                // 定期检查和修复按钮
                setInterval(function () {
                    // 检查是否有未经用户点击而显示的解析
                    const autoShownSolutions = document.querySelectorAll('.solution-content.show:not(.user-clicked), .inline-solution-content.show:not(.user-clicked)');
                    if (autoShownSolutions.length > 0) {
                        console.log(`发现${autoShownSolutions.length}个未经用户点击而显示的解析，强制隐藏`);
                        autoShownSolutions.forEach(solution => {
                            solution.classList.remove('show');
                            solution.style.display = 'none';
                            solution.style.opacity = '0';
                            solution.style.maxHeight = '0';
                            solution.style.overflow = 'hidden';
                            solution.style.visibility = 'hidden';

                            // 如果是内联解析，清除padding
                            if (solution.classList.contains('inline-solution-content')) {
                                solution.style.padding = '0';
                            }
                        });
                    }

                    // 修复按钮
                    fixSolutionButtons();
                    fixInlineButtons();
                }, 500);
            }

            // 在DOM加载完成后执行初始化
            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', function () {
                    setTimeout(init, 100);
                });
            } else {
                // 如果DOM已经加载完成，立即执行
                setTimeout(init, 50);
            }

            // 页面完全加载后再次执行
            window.addEventListener('load', function () {
                setTimeout(init, 300);

                // 20ms后再次强制隐藏，防止其他脚本加载后显示解析
                setTimeout(forceHideAllSolutions, 500);
                setTimeout(forceHideAllSolutions, 1000);
                setTimeout(forceHideAllSolutions, 2000);
            });
        })();
    </script>

    <!-- 添加紧急内联修复样式 -->

    <style>

        .fullscreen-mode .problem-content,
