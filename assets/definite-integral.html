    <!-- 修复全屏模式下点击空白区域显示下一行解析内容 -->
    <script>
(function() {
    console.log('开始修复点击解析区域显示下一行功能');
    
    // 确保showNextLine函数能正确响应点击
    window.showNextLine = function(slideIndex, isClick) {
        console.log('点击调用showNextLine', slideIndex, isClick);
        
        // 获取解析文本元素
        const solutionText = document.getElementById(`inline-solution-text-${slideIndex}`);
        if (!solutionText) {
            console.error('找不到解析文本元素', slideIndex);
            return;
        }
        
        // 确保习题数据已加载
        if (!window.fullscreenExercises || !Array.isArray(window.fullscreenExercises)) {
            console.error('习题数据未加载');
            return;
        }
        
        // 获取当前习题数据
        const exercise = window.fullscreenExercises[slideIndex];
        if (!exercise || !exercise.explanation) {
            console.error('没有找到习题解析内容');
            return;
        }
        
        // 初始化行数据（如果是第一次调用）
        if (window.currentLine === 0 || !window.solutionLines || !window.solutionLines.length) {
            // 分割解析内容为行
            window.solutionLines = exercise.explanation
                .split(/(?<=[.!?])\s+|(?<=\n)\s*(?=\S)/g)
                .filter(p => p && p.trim().length > 0);
            
            window.totalLines = window.solutionLines.length;
            console.log(`解析总行数: ${window.totalLines}`);
        }
        
        // 显示下一行内容
        if (window.currentLine < window.totalLines) {
            console.log(`显示第 ${window.currentLine + 1} 行，共 ${window.totalLines} 行`);
            
            // 获取当前行内容
            const lineContent = window.solutionLines[window.currentLine];
            
            // 创建新段落
            const newParagraph = document.createElement('div');
            newParagraph.className = 'solution-paragraph';
            newParagraph.innerHTML = lineContent;
            solutionText.appendChild(newParagraph);
            
            // 更新行计数
            window.currentLine++;
            
            // 更新按钮文本
            updateToggleButton(slideIndex);
            
            // 渲染数学公式
            if (window.MathJax && window.MathJax.typesetPromise) {
                window.MathJax.typesetPromise([solutionText])
                    .catch(err => console.warn('MathJax渲染错误:', err));
            }
            
            // 点击时自动滚动到新内容
            if (isClick) {
                setTimeout(() => {
                    solutionText.scrollIntoView({ behavior: 'smooth', block: 'end' });
                }, 100);
            }
        }
    };
    
    // 更新按钮状态
    function updateToggleButton(slideIndex) {
        const toggleButton = document.querySelector(`.inline-toggle-solution-btn[data-slide="${slideIndex}"]`);
        if (toggleButton) {
            if (window.currentLine < window.totalLines) {
                toggleButton.innerHTML = `<i class="fas fa-arrow-down"></i> 显示下一行 (${window.currentLine}/${window.totalLines})`;
            } else {
                toggleButton.innerHTML = '<i class="fas fa-check-circle"></i> 解析已完全显示';
            }
        }
    }
    
    // 修复解析内容点击事件
    function fixSolutionClickEvent() {
        // 查找所有已显示的解析内容
        document.querySelectorAll('.inline-solution-content.user-clicked').forEach(content => {
            // 如果已经处理过，则跳过
            if (content.hasAttribute('data-click-fixed')) return;
            
            // 标记为已处理
            content.setAttribute('data-click-fixed', 'true');
            
            // 获取幻灯片索引
            const slideIndex = parseInt(
                content.id.replace('inline-solution-', '') || 
                content.previousElementSibling?.getAttribute('data-slide') || 
                window.currentSlideIndex || 0
            );
            
            // 添加新的点击事件监听器
            content.addEventListener('click', function(e) {
                // 确保不是点击按钮或其他交互元素
                if (e.target.tagName === 'BUTTON' || 
                    e.target.closest('button') || 
                    e.target.closest('a') ||
                    e.target.classList.contains('inline-toggle-solution-btn')) {
                    return;
                }
                
                console.log('点击解析内容区域', slideIndex);
                e.preventDefault();
                e.stopPropagation();
                
                // 调用显示下一行函数
                window.showNextLine(slideIndex, true);
            });
            
            // 添加视觉提示样式
            content.style.cursor = 'pointer';
        });
    }
    
    // 定期检查并修复解析内容点击事件
    setInterval(fixSolutionClickEvent, 500);
    
    // 覆盖toggleSolution函数，确保正确设置类名和绑定事件
    const originalFixInlineButtons = window.fixInlineButtons;
    window.fixInlineButtons = function() {
        // 调用原始函数
        if (typeof originalFixInlineButtons === 'function') {
            originalFixInlineButtons();
        }
        
        // 增强点击事件绑定
        document.querySelectorAll('.inline-toggle-solution-btn').forEach(btn => {
            // 如果已经处理过，则跳过
            if (btn.hasAttribute('data-click-handler')) return;
            
            // 标记为已处理
            btn.setAttribute('data-click-handler', 'true');
            
            // 清除旧事件
            btn.addEventListener('click', function(e) {
                e.preventDefault();
                e.stopPropagation();
                
                const slideIndex = parseInt(this.getAttribute('data-slide'));
                const solutionContent = document.getElementById(`inline-solution-${slideIndex}`);
                
                if (!solutionContent) {
                    console.error('找不到解析容器:', slideIndex);
                    return;
                }
                
                if (solutionContent.classList.contains('user-clicked')) {
                    // 隐藏解析
                    solutionContent.classList.remove('user-clicked', 'show');
                    solutionContent.style.maxHeight = '0';
                    solutionContent.style.opacity = '0';
                    solutionContent.style.padding = '0';
                    solutionContent.style.visibility = 'hidden';
                    this.innerHTML = '<i class="fas fa-lightbulb"></i> 显示解析';
                    
                    // 重置行计数
                    window.currentLine = 0;
                    window.totalLines = 0;
                    window.solutionLines = [];
                    
                    // 清空内容
                    const solutionText = document.getElementById(`inline-solution-text-${slideIndex}`);
                    if (solutionText) {
                        solutionText.innerHTML = '';
                    }
                } else {
                    // 显示解析
                    solutionContent.classList.add('user-clicked', 'show');
                    solutionContent.style.maxHeight = '2000px';
                    solutionContent.style.opacity = '1';
                    solutionContent.style.padding = '20px';
                    solutionContent.style.visibility = 'visible';
                    solutionContent.style.display = 'block';
                    
                    // 重置行计数
                    window.currentLine = 0;
                    window.solutionLines = [];
                    
                    // 显示第一行
                    setTimeout(() => {
                        window.showNextLine(slideIndex, false);
                        
                        // 立即绑定点击事件，无需等待下一次循环
                        fixSolutionClickEvent();
                    }, 50);
                }
            });
        });
    };
    
    // 添加明显的视觉反馈样式
    const style = document.createElement('style');
    style.textContent = `
        .inline-solution-content.user-clicked {
            cursor: pointer;
            position: relative;
            z-index: 100;
        }
        
        .inline-solution-content.user-clicked:hover {
            background-color: rgba(52, 152, 219, 0.05);
        }
        
        .inline-solution-content.user-clicked:active {
            background-color: rgba(52, 152, 219, 0.1);
        }
        
        .solution-paragraph {
            margin-bottom: 0.8em;
            animation: fadeIn 0.3s ease;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }
    `;
    document.head.appendChild(style);
    
    // 初始运行一次修复
    setTimeout(() => {
        fixSolutionClickEvent();
        console.log('点击解析区域显示下一行功能修复完成');
    }, 100);
})();
</script>
